<html>
<body>
  
<div class="login-container">

<form id="loginForm" class="login-card">

<h2>Admin Login</h2>

<p class="login-subtitle">
Sign in to manage your portfolio
</p>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

<button
type="button"
id="forgotPassword"
class="forgot-btn">

Forgot Password?

</button>

</form>

</div>
  <script type="module" src="./login.js"></script>
</body>
</html>
